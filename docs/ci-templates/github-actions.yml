name: Yolo AI Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # Required to post review comments

    steps:
      - uses: actions/checkout@v4

      - name: Get PR Number
        id: pr
        run: echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Run Yolo AI Review
        run: npx yolo run
        env:
          # GitHub context — provided automatically by GitHub Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}

          # AI Provider — store these in your repository secrets
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          # Optional: Telegram notifications
          # TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # TELEGRAM_TRIGGER_CATEGORIES: "security,critical"
