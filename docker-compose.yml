services:
  yolo:
    image: yolo-ai-reviewer:latest
    build: .
    container_name: yolo-reviewer
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount your config.yml so you can edit it without rebuilding the image
      - ./config.yml:/app/config.yml:ro
    env_file:
      # Copy .env.example to .env and fill in your credentials
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
