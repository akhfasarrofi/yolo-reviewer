skillsPath: ".skills"
responseLanguage: "English"
features:
  autoResolve: true
  summaryComment: true

output:
  format: json
  schema:
    comments:
      type: array
      items:
        line:
          type: integer
          description: >
            Line number in the diff where the issue is found.
        category:
          type: string
          description: >
            Issue category (e.g. security, performance, clean-code, bug, style).
        issue:
          type: string
          description: >
            Description of the issue based on active skill rules.
        suggestion:
          type: string
          description: >
            Actionable and clear technical solution.
        replacementCode:
          type: string
          required: false
          description: >
            Optional direct code replacement.

